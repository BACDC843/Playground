<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }
</style>
</head>
<body>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0e0e1e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c96d"/>
    </linearGradient>
    <linearGradient id="statCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22223a"/>
      <stop offset="100%" style="stop-color:#16161e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Gold bars -->
  <rect x="0" y="0" width="1080" height="6" fill="url(#gold)"/>
  <rect x="0" y="1074" width="1080" height="6" fill="url(#gold)"/>

  <!-- Decorative large circle background -->
  <circle cx="540" cy="540" r="450" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.08"/>
  <circle cx="540" cy="540" r="350" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.08"/>
  <circle cx="540" cy="540" r="250" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Brand -->
  <text x="54" y="60" font-family="'Georgia', serif" font-size="22" fill="#ffffff" letter-spacing="3">RENEW</text>
  <text x="122" y="60" font-family="'Georgia', serif" font-size="22" fill="#c9a84c" letter-spacing="3"> URBAN</text>
  <rect x="54" y="65" width="120" height="1.5" fill="#c9a84c"/>
  <text x="54" y="112" font-family="'Arial', sans-serif" font-size="13" fill="#c9a84c" letter-spacing="4" font-weight="300">04 / 05</text>

  <!-- Header -->
  <text x="540" y="190" font-family="'Georgia', serif" font-size="50" fill="#ffffff" text-anchor="middle">THE RENEW URBAN</text>
  <text x="540" y="248" font-family="'Georgia', serif" font-size="50" fill="url(#gold)" text-anchor="middle">DIFFERENCE</text>
  <rect x="390" y="265" width="300" height="2" fill="url(#gold)"/>

  <!-- Stat cards — 2x2 grid -->
  <!-- Top Left -->
  <rect x="80" y="310" width="440" height="320" fill="url(#statCard)" rx="10"/>
  <rect x="80" y="310" width="440" height="5" fill="url(#gold)" rx="2"/>
  <!-- Number -->
  <text x="300" y="450" font-family="'Georgia', serif" font-size="110" fill="url(#gold)" text-anchor="middle" filter="url(#glow)" fill-opacity="0.9">98</text>
  <text x="380" y="430" font-family="'Georgia', serif" font-size="40" fill="#c9a84c" text-anchor="middle">%</text>
  <text x="300" y="490" font-family="'Arial', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="3" font-weight="300">CLIENT SATISFACTION</text>
  <text x="300" y="516" font-family="'Arial', sans-serif" font-size="13" fill="#9999bb" text-anchor="middle">Based on post-project surveys</text>
  <!-- Icon — star row -->
  <text x="300" y="600" font-family="'Arial', sans-serif" font-size="24" fill="#c9a84c" text-anchor="middle">★ ★ ★ ★ ★</text>

  <!-- Top Right -->
  <rect x="560" y="310" width="440" height="320" fill="url(#statCard)" rx="10"/>
  <rect x="560" y="310" width="440" height="5" fill="url(#gold)" rx="2"/>
  <text x="780" y="450" font-family="'Georgia', serif" font-size="110" fill="url(#gold)" text-anchor="middle" filter="url(#glow)" fill-opacity="0.9">500</text>
  <text x="780" y="490" font-family="'Arial', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="3" font-weight="300">KITCHENS COMPLETED</text>
  <text x="780" y="516" font-family="'Arial', sans-serif" font-size="13" fill="#9999bb" text-anchor="middle">And counting across the metro area</text>
  <!-- Icon — house row -->
  <rect x="740" y="570" width="80" height="2" fill="#c9a84c" fill-opacity="0.4"/>
  <text x="780" y="600" font-family="'Arial', sans-serif" font-size="15" fill="#c9a84c" text-anchor="middle" letter-spacing="2">HOMES TRANSFORMED</text>

  <!-- Bottom Left -->
  <rect x="80" y="660" width="440" height="320" fill="url(#statCard)" rx="10"/>
  <rect x="80" y="660" width="440" height="5" fill="url(#gold)" rx="2"/>
  <text x="300" y="800" font-family="'Georgia', serif" font-size="110" fill="url(#gold)" text-anchor="middle" filter="url(#glow)" fill-opacity="0.9">15+</text>
  <text x="300" y="840" font-family="'Arial', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="3" font-weight="300">YEARS EXPERIENCE</text>
  <text x="300" y="866" font-family="'Arial', sans-serif" font-size="13" fill="#9999bb" text-anchor="middle">Serving our community since 2010</text>
  <rect x="240" y="920" width="120" height="2" fill="#c9a84c" fill-opacity="0.4"/>
  <text x="300" y="950" font-family="'Arial', sans-serif" font-size="15" fill="#c9a84c" text-anchor="middle" letter-spacing="2">LICENSED &amp; INSURED</text>

  <!-- Bottom Right -->
  <rect x="560" y="660" width="440" height="320" fill="url(#statCard)" rx="10"/>
  <rect x="560" y="660" width="440" height="5" fill="url(#gold)" rx="2"/>
  <text x="780" y="800" font-family="'Georgia', serif" font-size="110" fill="url(#gold)" text-anchor="middle" filter="url(#glow)" fill-opacity="0.9">2yr</text>
  <text x="780" y="840" font-family="'Arial', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="3" font-weight="300">WORKMANSHIP WARRANTY</text>
  <text x="780" y="866" font-family="'Arial', sans-serif" font-size="13" fill="#9999bb" text-anchor="middle">We stand behind every project</text>
  <rect x="720" y="920" width="120" height="2" fill="#c9a84c" fill-opacity="0.4"/>
  <text x="780" y="950" font-family="'Arial', sans-serif" font-size="15" fill="#c9a84c" text-anchor="middle" letter-spacing="2">GUARANTEED QUALITY</text>

  <!-- Swipe -->
  <text x="880" y="1050" font-family="'Arial', sans-serif" font-size="13" fill="#c9a84c" letter-spacing="2" text-anchor="middle" font-weight="300">SWIPE →</text>
</svg>
</body>
</html>
